<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食事ログ | HEALTH LOG</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    /* 食事ギャラリー専用スタイル */
    .gallery-container { padding: 20px 12px; }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .meal-card {
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .meal-img-wrapper {
      width: 100%;
      padding-top: 100%; /* 正方形にするテクニック */
      position: relative;
      background: var(--clr-bg);
    }
    .meal-img-wrapper img {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
    }
    .meal-img-placeholder {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: var(--clr-text-secondary); font-size: 2rem; background: var(--clr-surface2);
    }
    .meal-info { padding: 10px; }
    .meal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .meal-type { font-size: 0.7rem; font-weight: 700; color: var(--clr-accent); border: 1px solid var(--clr-accent); padding: 2px 6px; border-radius: 4px; }
    .meal-date { font-size: 0.7rem; color: var(--clr-text-secondary); font-family: var(--font-en); }
    .meal-memo { font-size: 0.8rem; color: var(--clr-text-primary); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background: var(--clr-bg);">
  <header class="app-header" style="background: var(--clr-surface); border-bottom: 1px solid var(--clr-border);">
    <div class="header-inner" style="flex-direction: row; justify-content: space-between; align-items: center;">
      <a href="index.html" style="color: var(--clr-text-primary); text-decoration: none; font-size: 1.1rem;"><i class="fas fa-arrow-left"></i></a>
      <div style="font-weight: 800; color: var(--clr-text-primary); font-size: 1rem; letter-spacing: 0.05em;">MEAL LOGS</div>
      <div style="width: 20px;"></div>
    </div>
  </header>

  <main class="app-main gallery-container">
    <div class="gallery-grid" id="mealGallery">
      </div>
  </main>

  <script src="supabase-client.js"></script>
  <script src="app.js"></script> <script src="meals.js"></script>
</body>
</html>
