<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GALLERY // MEALS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Instagram Style UI */
    .gallery-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;
    }
    .meal-item {
      position: relative; width: 100%; aspect-ratio: 1 / 1; cursor: pointer;
      background: #111; overflow: hidden;
    }
    .meal-item img {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
    }
    .meal-badge-overlay {
      position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.5); 
      color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; font-weight: 700;
    }

    /* Detail Modal Styles */
    .modal-content.instagram-style {
      padding: 0; overflow: hidden; background: #000; max-width: 500px;
    }
    .md-image-full { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #000; }
    .md-body { padding: 20px; }
    .md-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .md-badge { background: var(--clr-accent); color: #000; font-size: 0.7rem; font-weight: 800; padding: 3px 8px; border-radius: 4px; }
    .md-date { color: var(--clr-text-secondary); font-size: 0.8rem; font-family: var(--font-en); }
    .md-memo { color: #fff; font-size: 0.9rem; line-height: 1.6; margin-bottom: 24px; }
    
    .ai-pending-box {
      background: rgba(251, 191, 36, 0.05); border: 1px dashed var(--clr-border);
      border-radius: 8px; padding: 16px; margin-bottom: 20px; text-align: center;
    }
    .skeleton-line { height: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; margin: 8px 0; }
  </style>
</head>
<body style="background: #000;">
  <header class="app-header" style="background: #000; border-bottom: 1px solid rgba(255,255,255,0.1);">
    <div class="header-inner" style="justify-content: flex-start; gap: 20px;">
      <a href="index.html" style="color: #fff;"><i class="fas fa-chevron-left"></i></a>
      <div class="logo">GALLERY</div>
    </div>
  </header>

  <main>
    <div class="gallery-grid" id="mealGallery">
      </div>
  </main>

  <div class="modal-overlay" id="mealDetailModal">
    <div class="modal-content instagram-style">
      <div id="mdImageContainer"></div>
      <div class="md-body">
        <div class="md-meta">
          <span id="mdBadge" class="md-badge"></span>
          <span id="mdDate" class="md-date"></span>
        </div>
        
        <div class="ai-pending-box">
          <div style="font-size: 0.75rem; color: var(--clr-accent); margin-bottom: 12px; font-weight: 800;">
            <i class="fas fa-microchip fa-spin"></i> AI ANALYZING STANDBY
          </div>
          <div class="skeleton-line" style="width: 80%;"></div>
          <div class="skeleton-line" style="width: 60%;"></div>
        </div>

        <div id="mdMemo" class="md-memo"></div>
        
        <div style="display: flex; gap: 16px;">
          <button id="btnMdDelete" style="background:none; border:none; color:#ff4d4d; font-weight:800; font-size:0.9rem; cursor:pointer;">Delete</button>
          <button id="btnMdClose" class="btn-primary" style="flex:1; margin-top:0;">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="app.js"></script>
  <script src="meals.js"></script>
</body>
</html>
