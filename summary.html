<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>履歴サマリー | 健康管理システム</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="summary.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<header class="app-header">
  <div class="header-inner">
    <div class="header-logo"><a href="index.html" style="color:inherit;text-decoration:none;"><i class="fas fa-chart-bar"></i><span> 分析サマリー</span></a></div>
  </div>
</header>
<main class="app-main">
  <div class="summary-month-bar">
    <button class="month-nav-btn-sm" id="prevMonthBtn"><i class="fas fa-chevron-left"></i></button>
    <div class="summary-month-label" id="summaryMonthLabel">読み込み中...</div>
    <button class="month-nav-btn-sm" id="nextMonthBtn"><i class="fas fa-chevron-right"></i></button>
  </div>
  <div class="summary-kpi-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px;">
    <div class="kpi-card income"><div class="kpi-label">平均体重</div><div class="kpi-value" id="avgWeight">-- kg</div></div>
    <div class="kpi-card expense"><div class="kpi-label">平均睡眠</div><div class="kpi-value" id="avgSleep">-- h</div></div>
    <div class="kpi-card balance"><div class="kpi-label">記録日数</div><div class="kpi-value" id="monthCount">0 日</div></div>
  </div>
  <div class="chart-card">
    <div class="chart-card-header">月間コンディション推移</div>
    <div style="height:200px; position:relative;"><canvas id="monthlyTrendChart"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-card-header">日次ログ詳細</div>
    <div id="dailyLogList"></div>
  </div>
</main>
<script src="supabase-client.js"></script>
<script src="summary.js"></script>
</body>
</html>
