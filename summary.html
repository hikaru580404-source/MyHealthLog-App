<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>「**履歴サマリー**」 | 健康管理システム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="summary.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="header-logo">
      <a href="index.html" style="color:inherit;text-decoration:none;display:flex;align-items:center;gap:6px;">
        <i class="fas fa-chevron-left" style="font-size:.85rem;opacity:.8;"></i>
        <i class="fas fa-chart-bar"></i>
        <span>「**分析サマリー**」</span>
      </a>
    </div>
    <div class="header-nav">
      <a href="form.html" class="btn-form-link"><i class="fas fa-pen-alt"></i><span>「**記録**」</span></a>
      <a href="index.html" class="btn-form-link"><i class="fas fa-home"></i><span>HOME</span></a>
    </div>
  </div>
</header>

<main class="app-main">
  <div class="summary-month-bar">
    <button class="month-nav-btn-sm" id="prevMonthBtn"><i class="fas fa-chevron-left"></i></button>
    <div class="summary-month-label" id="summaryMonthLabel">──年──月</div>
    <button class="month-nav-btn-sm" id="nextMonthBtn"><i class="fas fa-chevron-right"></i></button>
  </div>

  <div class="summary-kpi-grid">
    <div class="s-kpi-card income">
      <div class="s-kpi-icon"><i class="fas fa-weight"></i></div>
      <div class="s-kpi-body">
        <div class="s-kpi-label">「**月間平均体重**」</div>
        <div class="s-kpi-value" id="avgWeight">-- kg</div>
      </div>
    </div>
    <div class="s-kpi-card expense">
      <div class="s-kpi-icon"><i class="fas fa-percent"></i></div>
      <div class="s-kpi-body">
        <div class="s-kpi-label">「**月間平均体脂肪**」</div>
        <div class="s-kpi-value" id="avgFat">-- %</div>
      </div>
    </div>
    <div class="s-kpi-card balance">
      <div class="s-kpi-icon"><i class="fas fa-calendar-check"></i></div>
      <div class="s-kpi-body">
        <div class="s-kpi-label">「**今月の計測数**」</div>
        <div class="s-kpi-value" id="monthCount">0 回</div>
      </div>
    </div>
  </div>

  <div class="summary-card">
    <div class="summary-card-header"><i class="fas fa-chart-line"></i> 「**体重・体脂肪推移**」</div>
    <div style="height:220px; position:relative;"><canvas id="healthTrendChart"></canvas></div>
  </div>

  <div class="summary-card">
    <div class="summary-card-header"><i class="fas fa-list-ul"></i> 「**計測記録明細**」</div>
    <div id="logDetailList">
      </div>
  </div>
</main>

<script src="supabase-client.js"></script>
<script src="summary.js"></script>
</body>
</html>
