<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | HEALTH LOG</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .auth-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .auth-card {
      background: var(--clr-surface); width: 100%; max-width: 400px;
      border-radius: var(--radius-lg); padding: 40px 32px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8); border: 1px solid var(--clr-border); text-align: center; backdrop-filter: blur(10px);
    }
    .auth-logo { font-size: 1.2rem; font-weight: 800; letter-spacing: 0.1em; color: var(--clr-text-secondary); margin-bottom: 8px; }
    .auth-title { font-size: 1.5rem; font-weight: 700; color: var(--clr-accent); margin-bottom: 32px; }
    .auth-input { width: 100%; padding: 14px; margin-bottom: 16px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-sm); color: #fff; font-size: 1rem; transition: 0.2s; }
    .auth-input:focus { border-color: var(--clr-accent); outline: none; background: rgba(0,0,0,0.4); }
    .btn-auth { width: 100%; padding: 14px; background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); color: #000; border: none; border-radius: var(--radius-sm); font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; margin-bottom: 24px; }
    .btn-auth:hover { opacity: 0.9; transform: translateY(-1px); }
    .auth-links { font-size: 0.85rem; font-weight: 600; }
    .auth-links a { color: var(--clr-text-secondary); text-decoration: none; cursor: pointer; transition: 0.2s; }
    .auth-links a:hover { color: var(--clr-accent); }
    .consent-group { display: none; text-align: left; margin-bottom: 20px; font-size: 0.8rem; color: var(--clr-text-secondary); }
    .auth-msg { margin-top: 16px; font-size: 0.85rem; font-weight: 600; min-height: 20px; color: #ef4444; }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">HEALTH LOG // DB</div>
      <div id="authTitle" class="auth-title">システム ログイン</div>
      
      <form id="authForm">
        <input type="email" id="email" class="auth-input" placeholder="Email Address" required>
        <input type="password" id="password" class="auth-input" placeholder="Password" required>
        
        <div id="consentGroup" class="consent-group">
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <input type="checkbox" id="consentCheck">
            <span>個人情報の取り扱いに同意する</span>
          </label>
        </div>
        
        <button type="submit" id="authSubmitBtn" class="btn-auth">ログイン</button>
        
        <div class="auth-links">
          <a id="toggleAuthMode">アカウントをお持ちでない方はこちら（新規登録）</a>
        </div>
        <div id="authMsg" class="auth-msg"></div>
      </form>
    </div>
  </div>

  <script src="supabase-client.js"></script>
  <script src="login.js"></script>
</body>
</html>
