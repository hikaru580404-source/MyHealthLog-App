<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン | HEALTH LOG</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ログイン画面専用のレイアウト */
    .auth-wrapper {
      display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;
    }
    .auth-card {
      background: var(--clr-surface); width: 100%; max-width: 400px;
      border-radius: var(--radius-lg); padding: 40px 30px;
      box-shadow: var(--shadow-md); border: 1px solid var(--clr-border);
      text-align: center;
    }
    .auth-logo { 
      font-size: 1.5rem; font-weight: 800; color: var(--clr-text-accent); 
      font-family: var(--font-en); letter-spacing: 0.05em; margin-bottom: 30px; 
    }
    .auth-input {
      width: 100%; padding: 14px; background: var(--clr-bg); border: 1px solid var(--clr-border);
      border-radius: 8px; margin-bottom: 20px; color: var(--clr-text-primary); font-family: inherit;
    }
    .auth-input:focus { border-color: var(--clr-accent); outline: none; }
    .auth-btn {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #f59e0b 0%, #fb923c 100%);
      color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s;
    }
    .auth-btn:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3); }
    .auth-links { margin-top: 24px; font-size: 0.85rem; }
    .auth-links a { color: var(--clr-text-secondary); text-decoration: none; transition: 0.2s; }
    .auth-links a:hover { color: var(--clr-text-accent); }
    
    /* ポップアップの点（ローディングアニメーション） */
    .loading-overlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(15, 23, 42, 0.85); z-index: 2000; align-items: center; justify-content: center; flex-direction: column;
    }
    .dots { display: flex; gap: 8px; margin-bottom: 16px; }
    .dot { 
        width: 12px; height: 12px; background: var(--clr-accent); border-radius: 50%; 
        animation: bounce 1.4s infinite ease-in-out both; 
    }
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 
        0%, 80%, 100% { transform: scale(0); } 
        40% { transform: scale(1); box-shadow: 0 0 10px rgba(245, 158, 11, 0.5); } 
    }
    .loading-text { color: var(--clr-text-primary); font-weight: 600; letter-spacing: 0.05em; font-family: var(--font-jp); }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">HEALTH LOG // DB</div>
      <form id="loginForm">
        <input type="email" id="email" class="auth-input" placeholder="メールアドレス" required>
        <input type="password" id="password" class="auth-input" placeholder="パスワード" required>
        <button type="submit" class="auth-btn">ログイン</button>
      </form>
      <div class="auth-links">
        <a href="register.html">アカウントをお持ちでない方はこちら（新規登録）</a>
      </div>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="loading-text">認証中...</div>
  </div>

  <script src="supabase-client.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      // ポップアップの点（ローディング）を表示
      document.getElementById('loadingOverlay').style.display = 'flex';
      
      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      
      if (error) {
        // エラー時はローディングを消してアラート
        document.getElementById('loadingOverlay').style.display = 'none';
        alert("ログインエラー: " + error.message);
      } else {
        // 成功時はダッシュボードへ遷移
        window.location.href = "index.html";
      }
    });
  </script>
</body>
</html>
