<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Dashboard | Governance</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <div class="logo" data-i18n="app_title">GOVERNANCE</div>
    </div>
    <div class="header-right">
      <button id="langToggleBtn" class="lang-toggle">EN | ja</button>
    </div>
  </header>

  <main class="dashboard-main">
    <section class="goal-section" id="highGoalCard">
      <div class="section-header">
        <i class="fas fa-star primary-color"></i>
        <span data-i18n="north_star">NORTH STAR</span>
      </div>
      <div class="goal-text" id="highGoalText"></div>
    </section>

    <section class="power-section">
      <div class="power-box">
        <div class="circle-chart" id="vitalityCircle">
          <div class="circle-inner">
            <span class="circle-val" id="vitalityValue">--</span>
          </div>
        </div>
        <div class="circle-label" data-i18n="vitality_ai">VITALITY SCORE</div>
      </div>
      <div class="power-box">
        <div class="circle-chart" id="powerCircle">
          <div class="circle-inner">
            <span class="circle-val" id="powerValue">80</span>
          </div>
        </div>
        <div class="circle-label" data-i18n="gov_power">GOVERNANCE POWER</div>
        <input type="range" id="powerSlider" min="0" max="100" value="80" class="power-slider">
      </div>
    </section>

    <section class="kpi-section">
      <div class="section-header">
        <span data-i18n="daily_kpi">Daily Log (KPIs)</span>
      </div>
      <div class="kpi-grid">
        <div class="kpi-card" data-kpi="weight">
          <div class="kpi-label" data-i18n="weight">WEIGHT</div>
          <div class="kpi-value"><span id="latestWeight">--</span> <span class="unit">kg</span></div>
          <div id="deltaWeight" class="kpi-delta"></div>
        </div>
        <div class="kpi-card" data-kpi="fat">
          <div class="kpi-label" data-i18n="fat">BODY FAT</div>
          <div class="kpi-value"><span id="latestFat">--</span> <span class="unit">%</span></div>
        </div>
        <div class="kpi-card" data-kpi="sleep">
          <div class="kpi-label" data-i18n="sleep_lbl">SLEEP</div>
          <div class="kpi-value"><span id="latestSleep">--</span> <span class="unit">h</span></div>
        </div>
        <div class="kpi-card" data-kpi="mental">
          <div class="kpi-label" data-i18n="mental">MENTAL</div>
          <div class="kpi-value" id="latestMental">--</div>
        </div>
      </div>
      <p class="kpi-hint" data-i18n="hint_click_kpi">* Tap cards for detailed charts & AI advice.</p>
    </section>

    <section class="action-grid">
      <button class="action-btn wake-btn" id="btnWaketime">
        <i class="fas fa-sun"></i> <span data-i18n="wake">Wake</span>
      </button>
      <button class="action-btn bed-btn" id="btnBedtime">
        <i class="fas fa-moon"></i> <span data-i18n="sleep">Sleep</span>
      </button>
    </section>
    
    <div style="padding: 0 16px 32px;">
        <button class="btn-primary" id="btnEditHistory" style="width: 100%;">
            <i class="fas fa-edit"></i> <span data-i18n="edit_history">Edit Daily Log</span>
        </button>
    </div>
  </main>

  <div id="kpiDetailModal" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <h3 id="mdKpiTitle" class="modal-title">--</h3>
      <div class="modal-main-val" id="mdKpiMainValue">--</div>
      <div class="modal-chart-container">
        <canvas id="detailModalChart"></canvas>
      </div>
      <p id="mdAdvice" class="modal-advice">--</p>
      <button class="btn-primary" onclick="document.getElementById('kpiDetailModal').style.display='none'" data-i18n="close">Close</button>
    </div>
  </div>

  <div id="nightOverlay" class="night-overlay">
    <div class="night-message" data-i18n="night_msg">Governance completed. Good night.</div>
  </div>

  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
