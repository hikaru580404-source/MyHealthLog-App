<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AsirLabo">
  <link rel="manifest" href="manifest.json">
  <title>HEALTH LOG // DB</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="form.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Ver 2.2 UI追加 */
    .btn-secondary.edit-history { width: 100%; padding: 16px; margin-top: 12px; font-size: 0.95rem; font-weight: 700; color: var(--clr-accent); border: 1px solid rgba(251, 191, 36, 0.3); }
    .btn-secondary.edit-history:hover { background: rgba(251, 191, 36, 0.1); border-color: var(--clr-accent); }
    
    /* 儀式ボタン：MealはMealsタブへのリンクにhrefで遷移。他の2つはJSでクイックログ */
    .btn-quick.wake { color: #f97316; }
    .btn-quick.meal { color: #84cc16; cursor: pointer; text-decoration: none; }
    .btn-quick.bed { background: linear-gradient(145deg, #fbbf24, #b45309); border: 2px solid #fef3c7; color: #fff; }
    
    /* 既存UI維持 */
    .score-slider::-webkit-slider-thumb { opacity: 0; }
    .score-slider::-moz-range-thumb { opacity: 0; }
    .ai-teaser-premium { border-color: var(--clr-accent); background: linear-gradient(135deg, rgba(251,191,36,0.1), transparent); }
    .streak-cell.lv-2 { background: var(--clr-accent); box-shadow: 0 0 8px var(--clr-accent); }
  </style>
</head>
<body>
<header class="app-header">
  <div class="header-inner">
    <div class="logo">HEALTH LOG <span style="color:var(--clr-text-secondary); font-weight:400;">// DB</span></div>
    <div style="display: flex; gap: 12px; align-items: center;">
      <button class="header-icon-btn" onclick="location.href='settings.html'"><i class="fas fa-cog"></i></button>
    </div>
  </div>
</header>
<main class="app-main">
  <div class="high-goal-container"><div class="high-goal-card" id="highGoalCard"><span class="high-goal-text" id="highGoalText">（タップして究極のゴールを設定）</span></div></div>
  <div class="dual-score-container">
    <div class="score-box"><div class="score-title">客観活力スコア (AI)</div><div class="score-circle-wrap"><div class="score-circle" id="vitalityCircle"><div class="score-inner"><span class="score-value"><span id="vitalityValue">--</span>%</span></div></div></div></div>
    <div class="score-box"><div class="score-title">主観戦闘力スコア</div><div class="score-circle-wrap"><div class="score-circle" id="powerCircle"><div class="score-inner"><span class="score-value"><span id="powerValue">80</span>%</span></div></div><input type="range" min="0" max="100" value="80" class="score-slider" id="powerSlider"></div></div>
  </div>
  <div class="quick-actions">
    <button class="btn-quick wake" id="btnWaketime"><i class="fas fa-sun"></i> Wake</button>
    <a href="meals.html" class="btn-quick meal"><i class="fas fa-utensils"></i> Meal</a>
    <button class="btn-quick bed" id="btnBedtime"><i class="fas fa-moon"></i> Sleep</button>
  </div>
  <button class="btn-secondary edit-history" id="btnEditHistory"><i class="fas fa-calendar-alt"></i> 日次記録（過去ログ修正・監査）</button>
  <div class="ai-teaser-premium" style="margin-top:24px;"><div class="ai-teaser-info"><div class="ai-teaser-icon"><i class="fas fa-brain"></i></div><div class="ai-teaser-text"><h4>AI Personal Coach Standby</h4><p>解析・ダイエット支援（準備中）</p></div></div></div>
  <section class="kpi-section" style="margin-top:24px;">
    <div class="kpi-card" data-kpi="weight"><div class="kpi-label">Weight</div><div class="kpi-value"><span id="latestWeight">--</span> kg</div><div id="deltaWeight" class="kpi-delta"></div></div>
    <div class="kpi-card" data-kpi="sleep"><div class="kpi-label">Sleep</div><div class="kpi-value"><span id="latestSleep">--</span> h</div><div id="deltaSleep" class="kpi-delta"></div></div>
    <div class="kpi-card" data-kpi="mental"><div class="kpi-label">Mental</div><div class="kpi-value" id="latestMental">--</div><div class="kpi-delta">--</div></div>
    <div class="kpi-card" data-kpi="streak"><div class="kpi-label">Streak</div><div class="kpi-value"><span id="streakDays">--</span> Days</div><div class="kpi-delta delta-good">Consecutive</div></div>
  </section>
  <div class="section-title">Activity Grid (Last 90 Days)</div>
  <div class="streak-container"><div class="streak-grid" id="activityGrid"></div></div>
</main>
<script src="supabase-client.js"></script>
<script src="app.js"></script>
</body>
</html>
