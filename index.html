<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AsirLabo OS | JWA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="dashboard-header">
        <div id="highGoalCard">
            <small style="color:var(--clr-accent)">NORTH STAR</small>
            <div id="highGoalText" data-i18n="high_goal_placeholder">Loading...</div>
        </div>
        <button id="langToggleBtn" class="btn-icon"><i class="fas fa-globe"></i></button>
    </header>

    <section class="vitality-section">
        <div class="vitality-circle-container">
            <div id="vitalityCircle">
                <div class="vitality-inner">
                    <small data-i18n="vitality_ai">Vitality</small>
                    <div class="vitality-score" id="vitalityValue">--</div>
                </div>
            </div>
        </div>
    </section>

    <div class="quick-actions">
        <div class="action-btn" id="btnWaketime">
            <i class="fas fa-sun"></i>
            <div data-i18n="wake">Wake</div>
        </div>
        <div class="action-btn" id="btnBedtime">
            <i class="fas fa-moon"></i>
            <div data-i18n="sleep">Sleep</div>
        </div>
    </div>

    <a href="#" class="history-link" id="navHistory" data-i18n="edit_history">
        History & Audit
    </a>

    <div class="modal-overlay" id="navConfirmModal">
        <div class="modal-content">
            <h3 id="navModalTitle">Title</h3>
            <p id="navModalDesc" style="color:var(--clr-text-secondary); font-size:0.9rem;"></p>
            <button class="history-link" id="navModalProceed" style="width:100%; border:none; margin:20px 0 0;">ENTER</button>
        </div>
    </div>

    <script src="supabase-client.js"></script>
    <script src="app.js"></script>
</body>
</html>
