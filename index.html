<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEALTH LOG // DB</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="form.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* 追加：AI解析ティザーカード（既存のstyle.cssと調和） */
    .ai-teaser-card {
      background: var(--clr-surface); border: 1px solid var(--clr-border);
      border-radius: var(--radius-md); padding: 20px; margin-bottom: 32px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; position: relative; overflow: hidden; backdrop-filter: blur(10px);
    }
    .ai-teaser-card::after {
      content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(251, 191, 36, 0.1), transparent);
      animation: shimmer 4s infinite;
    }
    @keyframes shimmer { 0% { left: -100%; } 100% { left: 200%; } }
    .ai-teaser-info { display: flex; align-items: center; gap: 16px; }
    .ai-teaser-icon { font-size: 1.5rem; color: var(--clr-accent); }
    .ai-teaser-text h4 { font-size: 0.9rem; color: var(--clr-text-primary); margin-bottom: 2px; }
    .ai-teaser-text p { font-size: 0.7rem; color: var(--clr-text-secondary); }

    /* 追加：GitHub風継続グリッド */
    .streak-container {
      background: var(--clr-surface); border: 1px solid var(--clr-border);
      border-radius: var(--radius-md); padding: 16px; margin-bottom: 32px;
    }
    .streak-grid {
      display: grid; grid-template-rows: repeat(7, 1fr); grid-auto-flow: column; gap: 4px;
      overflow-x: auto; padding-bottom: 4px;
    }
    .streak-cell {
      width: 12px; height: 12px; border-radius: 2px; background: rgba(255,255,255,0.05);
    }
    /* 継続レベルに応じた色付け */
    .streak-cell.lv-1 { background: #d9770644; } /* 記録あり */
    .streak-cell.lv-2 { background: #fbbf24; box-shadow: 0 0 5px var(--clr-accent); } /* 絶好調 */
  </style>
</head>
<body>
<header class="app-header">
  <div class="header-inner">
    <div class="logo">HEALTH LOG <span style="color:var(--clr-text-secondary); font-weight:400;">// DB</span></div>
    <div style="display: flex; gap: 16px; align-items: center;">
      <button id="langToggleBtn" class="header-icon-btn"><i class="fas fa-language"></i> EN/JA</button>
      <button id="settingsBtn" class="header-icon-btn"><i class="fas fa-cog"></i></button>
      <button id="logoutBtn" class="header-logout-btn"><i class="fas fa-sign-out-alt"></i> Log Out</button>
    </div>
  </div>
</header>

<main class="app-main">
  <div class="section-title" data-i18n="quick_action">Quick Action</div>
  <div class="quick-actions">
    <button class="btn-quick wake" id="btnWaketime"><i class="fas fa-sun" id="wakeIcon"></i> <span id="wakeText" data-i18n="wake">Wake Up</span></button>
    <button class="btn-quick meal" id="btnMealOpen"><i class="fas fa-utensils"></i> <span data-i18n="meal">Meal</span></button>
    <button class="btn-quick bed" id="btnBedtime"><i class="fas fa-moon" id="bedIcon"></i> <span id="bedText" data-i18n="sleep">Sleep</span></button>
  </div>

  <div class="section-title" data-i18n="kpi_title">KPI</div>
  <section class="kpi-section">
    <div class="kpi-card" data-kpi-key="weight">
      <div class="kpi-label" data-i18n="weight">Weight</div>
      <div class="kpi-value"><span id="latestWeight">-- kg</span></div>
      <div id="deltaWeight" class="kpi-delta"></div>
    </div>
    <div class="kpi-card" data-kpi-key="sleep_h">
      <div class="kpi-label" data-i18n="sleep_h">Sleep</div>
      <div class="kpi-value"><span id="latestSleep">-- h</span></div>
      <div id="deltaSleep" class="kpi-delta"></div>
    </div>
    <div class="kpi-card" data-kpi-key="streak">
      <div class="kpi-label" data-i18n="streak">Streak</div>
      <div class="kpi-value"><span id="streakDays">--</span> <span data-i18n="days" style="font-size: 0.9rem;">Days</span></div>
      <div class="kpi-delta delta-good" data-i18n="consecutive">Consecutive</div>
    </div>
    <div class="kpi-card" data-kpi-key="completion">
      <div class="kpi-label" data-i18n="completion">Completion</div>
      <div class="kpi-value"><span id="completionRate">--</span><span style="font-size: 0.9rem;">%</span></div>
      <div class="kpi-delta" data-i18n="last30days">Last 30 Days</div>
    </div>
  </section>

  <div class="ai-teaser-card" onclick="alert('AI解析機能を準備中です。高精度な食事アドバイスをお楽しみに！')">
    <div class="ai-teaser-info">
      <div class="ai-teaser-icon"><i class="fas fa-magic"></i></div>
      <div class="ai-teaser-text">
        <h4 data-i18n="ai_analysis_title">AI Meal Analysis</h4>
        <p data-i18n="ai_analysis_wait">Coming soon... Waiting for AI Integration</p>
      </div>
    </div>
    <div style="color: var(--clr-accent); font-size: 0.8rem;"><i class="fas fa-chevron-right"></i></div>
  </div>

  <div class="section-title">Activity Grid</div>
  <div class="streak-container">
    <div class="streak-grid" id="activityGrid"></div>
  </div>

  <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px;">
    <div class="section-title" style="margin-bottom: 0;" data-i18n="trend">7-Day Trend</div>
    <nav class="tab-nav">
      <button class="tab-btn active" data-i18n="analysis">Analysis</button>
      <button class="tab-btn" onclick="location.href='meals.html'" data-i18n="nav_meals">Meals</button>
      <button class="tab-btn" onclick="location.href='form.html'" data-i18n="nav_log">Daily Log</button>
      <button class="tab-btn" onclick="location.href='summary.html'" data-i18n="nav_history">History</button>
    </nav>
  </div>

  <div class="chart-card">
    <div class="chart-header-flex">
      <div class="chart-card-title" data-i18n="chart_title">Recent 7-Day Trend</div>
      <div class="chart-toggle">
        <button class="btn-toggle active" id="modeWeight">Weight / Fat</button>
        <button class="btn-toggle" id="modeSleep">Sleep / Mental</button>
      </div>
    </div>
    <div style="height:250px;"><canvas id="healthCorrelationChart"></canvas></div>
  </div>
</main>

<div id="toastMsg" class="toast"></div>

<script src="supabase-client.js"></script>
<script src="app.js"></script>
</body>
</html>
