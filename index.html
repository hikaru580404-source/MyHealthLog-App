<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEALTH LOG // DB</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="form.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* トーストアニメーション */
    #toastMsg {
      position: fixed; bottom: -50px; left: 50%; transform: translateX(-50%);
      background: var(--clr-accent); color: #111827; padding: 14px 24px;
      border-radius: 8px; font-weight: 700; z-index: 9999;
      box-shadow: 0 4px 15px rgba(251,191,36,0.4); opacity: 0;
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      font-family: var(--font-jp); font-size: 0.95rem; white-space: nowrap;
    }
    #toastMsg.show { bottom: 30px; opacity: 1; }
    
    /* ボタンの完全中央揃え */
    .btn-quick {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center; gap: 8px; padding: 20px !important; transition: all 0.3s ease;
    }
    .btn-quick.recorded {
        background: var(--clr-accent) !important; color: #111827 !important;
        border-color: var(--clr-accent) !important;
        box-shadow: 0 4px 15px rgba(251,191,36,0.3) !important;
        opacity: 0.9; cursor: pointer;
    }

    /* レスポンシブ8カード・最適化グリッド */
    .kpi-section {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(2, 1fr);
    }
    @media (min-width: 640px) {
        .kpi-section {
            grid-template-columns: repeat(4, 1fr);
        }
    }
    
    /* KPIカードをタップ可能にする */
    .kpi-card { transition: all 0.2s; cursor: pointer; }
    .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); border-color: rgba(251, 191, 36, 0.4); }

    /* プロフェッショナルUI最適化：Saveを強調・Cancelを控えめに */
    .modal-content .btn-primary {
        background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%) !important;
        color: #111827 !important;
        border: none !important;
        box-shadow: 0 4px 15px rgba(217, 119, 6, 0.3) !important;
    }
    .modal-content .btn-primary:hover { opacity: 0.9; }
    .modal-content .btn-secondary {
        background: transparent !important; color: var(--clr-text-secondary) !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
    }
    .modal-content .btn-secondary:hover { background: rgba(255, 255, 255, 0.05) !important; color: #fff !important; }
  </style>
</head>
<body>
<header class="app-header">
  <div class="header-inner">
    <div class="logo">HEALTH LOG <span style="color:var(--clr-text-secondary); font-weight:400;">// DB</span></div>
    <div style="display: flex; gap: 12px; align-items: center;">
      <button id="langToggleBtn" class="header-icon-btn">EN/JP</button>
      <button id="settingsBtn" class="header-icon-btn"><i class="fas fa-cog"></i></button>
      <button id="logoutBtn" class="header-logout-btn"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </div>
</header>

<main class="app-main">
  <div class="section-title" data-i18n="quick_action">Quick Action</div>
  <div class="quick-actions">
    <button class="btn-quick wake" id="btnWaketime">
      <i class="fas fa-sun" id="wakeIcon"></i> <span id="wakeText" data-i18n="wake">Wake Up</span>
    </button>
    <button class="btn-quick meal" id="btnMealOpen">
      <i class="fas fa-utensils"></i> <span data-i18n="meal">Meal</span>
    </button>
    <button class="btn-quick bed" id="btnBedtime">
      <i class="fas fa-moon" id="bedIcon"></i> <span id="bedText" data-i18n="sleep">Sleep</span>
    </button>
  </div>

  <div class="section-title" data-i18n="kpi_title">KPI</div>
  <section class="kpi-section">
    <div class="kpi-card" data-kpi-key="weight">
      <div class="kpi-label" data-i18n="weight">Weight</div>
      <div class="kpi-value"><span id="latestWeight">-- kg</span></div>
      <div id="deltaWeight" class="kpi-delta"></div>
    </div>
    <div class="kpi-card" data-kpi-key="fat_p">
      <div class="kpi-label" data-i18n="fat_p">Fat</div>
      <div class="kpi-value"><span id="latestFat">-- %</span></div>
      <div id="deltaFat" class="kpi-delta" style="color:var(--clr-text-secondary);">--</div>
    </div>
    <div class="kpi-card" data-kpi-key="calories">
      <div class="kpi-label" data-i18n="calories">Calories</div>
      <div class="kpi-value"><span id="todayCalories">0</span> <span style="font-size: 0.9rem; margin-left:4px;">kcal</span></div>
      <div class="kpi-delta delta-neutral" data-i18n="today_total">Today's Total</div>
    </div>
    <div class="kpi-card" data-kpi-key="sleep_h">
      <div class="kpi-label" data-i18n="sleep_h">Sleep</div>
      <div class="kpi-value"><span id="latestSleep">-- h</span></div>
      <div id="deltaSleep" class="kpi-delta"></div>
    </div>
    <div class="kpi-card" data-kpi-key="mental">
      <div class="kpi-label" data-i18n="mental">Mental Condition</div>
      <div class="kpi-value" style="font-size: 1.2rem;"><span id="latestMental">--</span></div>
      <div id="deltaMental" class="kpi-delta" style="color:var(--clr-text-secondary);">--</div>
    </div>
    <div class="kpi-card" data-kpi-key="streak">
      <div class="kpi-label" data-i18n="streak">Streak</div>
      <div class="kpi-value"><span id="streakDays">0</span> <span style="font-size: 0.9rem; margin-left:4px;" data-i18n="days">Days</span></div>
      <div class="kpi-delta delta-good" data-i18n="consecutive">Consecutive</div>
    </div>
    <div class="kpi-card" data-kpi-key="completion">
      <div class="kpi-label" data-i18n="completion">Completion</div>
      <div class="kpi-value"><span id="completionRate">0</span> <span style="font-size: 0.9rem; margin-left:4px;">%</span></div>
      <div class="kpi-delta delta-neutral" data-i18n="last30days">Last 30 Days</div>
    </div>
    <div class="kpi-card" data-kpi-key="month_count">
      <div class="kpi-label" data-i18n="month_count">Month Count</div>
      <div class="kpi-value"><span id="monthCount">0</span> <span style="font-size: 0.9rem; margin-left:4px;" data-i18n="days">Days</span></div>
      <div class="kpi-delta delta-good" data-i18n="logging">Logging</div>
    </div>
  </section>

  <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px;">
    <div class="section-title" style="margin-bottom: 0;" data-i18n="trend">7-Day Trend</div>
    <nav class="tab-nav">
      <button class="tab-btn active" data-i18n="analysis">Analysis</button>
      <button class="tab-btn" onclick="location.href='meals.html'" data-i18n="nav_meals">Meals</button>
      <button class="tab-btn" onclick="location.href='form.html'" data-i18n="nav_log">Daily Log</button>
      <button class="tab-btn" onclick="location.href='summary.html'" data-i18n="nav_history">History</button>
    </nav>
  </div>

  <div class="chart-card">
    <div class="chart-header-flex">
      <div class="chart-card-title" data-i18n="chart_title">Recent 7-Day Trend</div>
      <div class="chart-toggle">
        <button class="btn-toggle active" id="modeWeight">Weight / Fat</button>
        <button class="btn-toggle" id="modeSleep">Sleep / Mental</button>
      </div>
    </div>
    <div style="height:250px;"><canvas id="healthCorrelationChart"></canvas></div>
  </div>
</main>

<div class="modal-overlay" id="kpiModal">
  <div class="modal-content">
    <div class="modal-title" id="kpiModalTitle" style="color: var(--clr-text-secondary); font-size: 0.9rem; text-transform: uppercase; margin-bottom: 8px;">Detail</div>
    <div style="font-size: 2.2rem; font-weight: 800; color: var(--clr-accent); text-align: center; margin-bottom: 24px;" id="kpiModalValue">--</div>
    <div style="font-size: 0.9rem; color: var(--clr-text-primary); line-height: 1.6; background: rgba(251, 191, 36, 0.05); border-left: 3px solid var(--clr-accent); padding: 16px; border-radius: 0 8px 8px 0; font-family: var(--font-jp);" id="kpiModalDesc">
      </div>
    <button id="btnKpiClose" class="btn-primary" style="margin-top:24px;">閉じる</button>
  </div>
</div>

<div class="modal-overlay" id="initialSetupModal">
  <div class="modal-content" id="initModalBlock" style="max-height: 90vh; overflow-y: auto;">
    <div class="modal-title">Initial Setup</div>
    <div class="modal-desc">管理の基準となる最初のデータと、<br><span style="color: var(--clr-accent); font-weight:700;">あなたの目標値</span>を入力してください。</div>
    <form id="initialSetupForm">
      <div class="form-row-grid" style="background: rgba(251, 191, 36, 0.05); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid rgba(251, 191, 36, 0.2);">
        <div class="form-group" style="margin-bottom: 0;">
          <label class
