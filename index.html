<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AsirLabo">
  <link rel="manifest" href="manifest.json">
  <title>HEALTH LOG // DB</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --clr-bg-top: #151b2e; var(--clr-bg-bottom: #090c15;
      --clr-surface: rgba(26, 33, 51, 0.6); var(--clr-border: rgba(251, 191, 36, 0.2);
      --clr-accent: #fbbf24; var(--clr-text-primary: #f8fafc; var(--clr-text-secondary: #94a3b8;
      --font-en: 'Inter', sans-serif; --font-ja: 'Noto Sans JP', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-ja); background: radial-gradient(circle at top, var(--clr-bg-top), var(--clr-bg-bottom)); color: var(--clr-text-primary); line-height: 1.6; min-height: 100vh; }
    .app-header { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.03); position: sticky; top: 0; z-index: 100; }
    .header-inner { display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: 0 auto; }
    .logo { font-family: var(--font-en); font-weight: 800; color: var(--clr-text-primary); font-size: 1.1rem; letter-spacing: 0.1em; }
    .header-icon-btn { background: none; border: none; color: var(--clr-text-secondary); font-size: 1.1rem; cursor: pointer; margin-left: 12px;}
    .app-main { max-width: 600px; margin: 0 auto; padding: 24px 20px; padding-bottom: 100px; }
    
    /* North Star stylish design */
    .high-goal-container { margin-bottom: 24px; }
    .high-goal-card { background: linear-gradient(145deg, rgba(21, 27, 46, 0.9), rgba(9, 12, 21, 0.95)); border: 1px solid rgba(251, 191, 36, 0.3); border-radius: 16px; padding: 20px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.05); cursor: pointer; text-align: center; position: relative;}
    .high-goal-header { font-family: var(--font-en); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; color: var(--clr-text-secondary); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; justify-content: center;}
    .high-goal-text { font-size: 1.1rem; font-weight: 700; color: var(--clr-accent); text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

    .dual-score-container { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
    .score-box { background: var(--clr-surface); border-radius: 20px; padding: 24px 16px; text-align: center; border: 1px solid var(--clr-border); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .score-title { font-size: 0.8rem; font-weight: 700; color: var(--clr-text-secondary); margin-bottom: 16px; }
    .score-circle-wrap { width: 110px; height: 110px; border-radius: 50%; background: #0c0f18; margin: 0 auto; padding: 8px; display: flex; justify-content: center; align-items: center; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); }
    .score-circle { width: 100%; height: 100%; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.5s ease; }
    .score-inner { width: 75px; height: 75px; background: #0c0f18; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .score-value { font-family: var(--font-en); font-size: 1.7rem; font-weight: 800; color: #fff; }
    .score-slider { width: 100%; margin-top: 20px; accent-color: var(--clr-accent); cursor: ns-resize; }

    .quick-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    .btn-quick { background: var(--clr-surface); color: var(--clr-text-main); border: 1px solid var(--clr-border); padding: 18px 8px; border-radius: 12px; font-weight: 700; font-size: 0.9rem; cursor: pointer; display: flex; flex-direction: column; gap: 8px; align-items: center; text-decoration: none;}
    .btn-quick i { font-size: 1.3rem; }
    .btn-quick.wake i { color: #facc15; }
    .btn-quick.meal i { color: #38bdf8; }
    .btn-quick.bed i { color: #a78bfa; }
    
    .btn-secondary { width: 100%; background: transparent; color: var(--clr-text-secondary); border: 1px solid var(--clr-text-secondary); padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 32px;}

    /* キラキラアニメーション (AI バナー) */
    .shiny-banner { position: relative; overflow: hidden; background: linear-gradient(to right, rgba(30,41,59,0.8), rgba(15,23,42,0.8)); border: 1px solid rgba(251, 191, 36, 0.2); border-left: 3px solid var(--clr-accent); border-radius: 8px; padding: 16px; margin-bottom: 32px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
    .shiny-banner::before { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 100%); transform: skewX(-20deg); animation: shine 3s infinite; }
    @keyframes shine { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }
    .ai-teaser-info { display: flex; align-items: center; gap: 16px; }
    .ai-teaser-icon { color: var(--clr-accent); font-size: 1.5rem; }
    .ai-teaser-text h4 { font-family: var(--font-en); font-size: 0.9rem; color: #fff; margin-bottom: 4px;}
    .ai-teaser-text p { font-size: 0.75rem; color: var(--clr-text-secondary); }

    .kpi-section { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 32px; }
    .kpi-card { background: var(--clr-surface); padding: 16px; border-radius: 12px; border: 1px solid var(--clr-border); }
    .kpi-label { font-size: 0.75rem; color: var(--clr-text-secondary); font-weight: 700; margin-bottom: 8px; letter-spacing: 0.05em;}
    .kpi-value { font-family: var(--font-en); font-size: 1.6rem; font-weight: 700; color: #fff; }
    .kpi-delta { font-size: 0.8rem; margin-top: 4px; font-weight: 600; }
    .delta-good { color: #10b981; }
    .delta-bad { color: #ef4444; }
    
    .chart-card { background: var(--clr-surface); border-radius: 16px; padding: 16px; border: 1px solid var(--clr-border); margin-bottom: 32px;}
    .section-title { font-family: var(--font-en); font-weight: 700; font-size: 1rem; margin-bottom: 16px; letter-spacing: 0.05em; color: var(--clr-text-secondary); }
    .streak-container { background: var(--clr-surface); padding: 16px; border-radius: 16px; overflow-x: auto; border: 1px solid var(--clr-border); margin-bottom: 32px;}
    .streak-grid { display: flex; flex-direction: row-reverse; gap: 4px; min-width: max-content; }
    .streak-cell { width: 12px; height: 32px; background: rgba(255,255,255,0.03); border-radius: 2px; }
    .streak-cell.lv-2 { background: var(--clr-success); }
    
    /* モーダル */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: #111827; padding: 24px; border-radius: 16px; width: 90%; border: 1px solid var(--clr-border); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    .modal-title { font-size: 14px; color: var(--clr-text-secondary); margin-bottom: 12px; }
    .md-advice-box { background: rgba(255,255,255,0.03); border-left: 3px solid var(--clr-accent); padding: 16px; margin-bottom: 24px; font-size: 0.85rem; line-height: 1.6; color: #eee; border-radius: 0 4px 4px 0; }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="logo">HEALTH LOG <span style="color:var(--clr-text-secondary); font-weight:400;">// DB</span></div>
    <div style="display: flex; align-items: center;">
      <button id="langToggleBtn" class="header-icon-btn"><i class="fas fa-language"></i> EN/JA</button>
      <button class="header-icon-btn" onclick="location.href='settings.html'"><i class="fas fa-cog"></i></button>
      <button id="logoutBtn" class="header-icon-btn" style="color: var(--clr-danger);"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </div>
</header>

<main class="app-main">
  <div class="high-goal-container">
    <div class="high-goal-card" id="highGoalCard">
      <div class="high-goal-header">
        <i class="fas fa-compass" style="color: var(--clr-accent);"></i> <span data-i18n="north_star">NORTH STAR</span>
      </div>
      <span class="high-goal-text" id="highGoalText" data-i18n="high_goal_placeholder">（タップして究極のゴールを設定）</span>
    </div>
  </div>

  <div class="dual-score-container">
    <div class="score-box">
      <div class="score-title"><span data-i18n="vitality_ai">客観活力</span> <span style="color:#10b981;">(AI)</span></div>
      <div class="score-circle-wrap">
        <div class="score-circle" id="vitalityCircle" style="background: conic-gradient(#10b981 0%, #1e293b 0%);">
          <div class="score-inner"><span class="score-value"><span id="vitalityValue">--</span>%</span></div>
        </div>
      </div>
    </div>
    
    <div class="score-box">
      <div class="score-title" data-i18n="gov_power">主観戦闘力</div>
      <div class="score-circle-wrap">
        <div class="score-circle" id="powerCircle" style="background: conic-gradient(#eecb70 80%, #1e293b 80%);">
          <div class="score-inner"><span class="score-value"><span id="powerValue">80</span>%</span></div>
        </div>
      </div>
      <input type="range" min="0" max="100" value="80" class="score-slider" id="powerSlider">
    </div>
  </div>

  <div class="quick-actions">
    <button class="btn-quick wake" id="btnWaketime"><i class="fas fa-sun"></i> <span data-i18n="wake">Wake</span></button>
    <a href="meals.html" class="btn-quick meal"><i class="fas fa-utensils"></i> <span data-i18n="meal">Meal</span></a>
    <button class="btn-quick bed" id="btnBedtime"><i class="fas fa-moon"></i> <span data-i18n="sleep">Sleep</span></button>
  </div>
  
  <button class="btn-secondary" id="btnEditHistory"><i class="fas fa-calendar-alt"></i> <span data-i18n="edit_history">日次記録（過去ログ修正・監査）</span></button>

  <div class="shiny-banner" onclick="alert('プレミアム機能は準備中です。')">
    <div class="ai-teaser-info">
      <div class="ai-teaser-icon"><i class="fas fa-brain"></i></div>
      <div class="ai-teaser-text">
        <h4 data-i18n="ai_analysis_title">AI Personal Coach Standby</h4>
        <p data-i18n="ai_analysis_wait">画像解析・ダイエット支援（準備中）</p>
      </div>
    </div>
    <div class="shiny-arrow"><i class="fas fa-chevron-right"></i></div>
  </div>

  <section class="kpi-section">
    <div class="kpi-card" data-kpi="weight"><div class="kpi-label" data-i18n="weight">Weight</div><div class="kpi-value"><span id="latestWeight">--</span> kg</div><div id="deltaWeight" class="kpi-delta"></div></div>
    <div class="kpi-card" data-kpi="fat"><div class="kpi-label" data-i18n="fat">Body Fat</div><div class="kpi-value"><span id="latestFat">--</span> %</div><div class="kpi-delta" id="deltaFat">--</div></div>
    <div class="kpi-card" data-kpi="sleep"><div class="kpi-label" data-i18n="sleep_lbl">Sleep</div><div class="kpi-value"><span id="latestSleep">--</span> h</div><div id="deltaSleep" class="kpi-delta"></div></div>
    <div class="kpi-card" data-kpi="mental"><div class="kpi-label" data-i18n="mental">Mental</div><div class="kpi-value" id="latestMental">--</div><div class="kpi-delta">--</div></div>
    <div class="kpi-card" data-kpi="streak"><div class="kpi-label" data-i18n="streak">Streak</div><div class="kpi-value"><span id="streakDays">--</span> <span style="font-size:0.9rem;">Days</span></div></div>
    <div class="kpi-card" data-kpi="log_count"><div class="kpi-label" data-i18n="logs">Logs</div><div class="kpi-value"><span id="monthLogs">--</span> <span style="font-size:0.9rem;">Days</span></div></div>
  </section>

  <div class="chart-card">
    <div style="height:250px;"><canvas id="healthCorrelationChart"></canvas></div>
  </div>

  <div class="section-title" data-i18n="activity_grid">Activity Grid</div>
  <div class="streak-container">
    <div class="streak-grid" id="activityGrid"></div>
  </div>

</main>

<div class="modal-overlay" id="kpiDetailModal" style="display:none;">
  <div class="modal-content" style="max-width: 450px;">
    <div class="modal-title" id="mdKpiTitle" style="color: var(--clr-accent);">Detail</div>
    <div class="kpi-value" style="text-align:center; margin-bottom:20px; font-size: 2.5rem;" id="mdKpiMainValue">--</div>
    <div id="mdAdvice" class="md-advice-box"></div>
    <div style="height:180px; margin-bottom: 24px;"><canvas id="detailModalChart"></canvas></div>
    <button class="btn-secondary" style="border:none; background: var(--clr-surface); color: var(--clr-text-main);" onclick="document.getElementById('kpiDetailModal').style.display='none'" data-i18n="close">Close</button>
  </div>
</div>

<script src="auth.js"></script>
<script src="app.js"></script>
</body>
</html>
