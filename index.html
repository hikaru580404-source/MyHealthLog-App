<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEALTH LOG // DB</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="form.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* 追加実装: トーストアニメーションとボタンの内部レイアウト調整用 */
    #toastMsg {
      position: fixed; bottom: -50px; left: 50%; transform: translateX(-50%);
      background: var(--clr-accent); color: #111827; padding: 14px 24px;
      border-radius: 8px; font-weight: 700; z-index: 9999;
      box-shadow: 0 4px 15px rgba(251,191,36,0.4); opacity: 0;
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      font-family: var(--font-jp); font-size: 0.95rem; white-space: nowrap;
    }
    #toastMsg.show { bottom: 30px; opacity: 1; }
    
    .btn-quick-inner { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .recorded-time { font-size: 0.75rem; font-weight: 600; font-family: var(--font-en); opacity: 0; transition: opacity 0.3s; }
    .btn-quick.recorded {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%) !important;
      color: #fff !important; border-color: transparent !important;
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4) !important;
    }
  </style>
</head>
<body>
<header class="app-header">
  <div class="header-inner">
    <div class="logo">HEALTH LOG <span style="color:var(--clr-text-secondary); font-weight:400;">// DB</span></div>
    <div style="display: flex; gap: 12px; align-items: center;">
      <button id="langToggleBtn" class="header-icon-btn">EN/JP</button>
      <button id="settingsBtn" class="header-icon-btn"><i class="fas fa-cog"></i></button>
      <button id="logoutBtn" class="header-logout-btn"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </div>
</header>

<main class="app-main">
  <div class="section-title" data-i18n="quick_action">Quick Action</div>
  <div class="quick-actions">
    <button class="btn-quick wake" id="btnWaketime">
      <div class="btn-quick-inner">
        <div><i class="fas fa-sun" id="wakeIcon"></i> <span data-i18n="wake">Wake Up</span></div>
        <div class="recorded-time" id="wakeTimeDisplay">--:--</div>
      </div>
    </button>
    <button class="btn-quick meal" id="btnMealOpen">
      <div class="btn-quick-inner">
        <div><i class="fas fa-utensils"></i> <span data-i18n="meal">Meal</span></div>
        <div style="height: 14px;"></div>
      </div>
    </button>
    <button class="btn-quick bed" id="btnBedtime">
      <div class="btn-quick-inner">
        <div><i class="fas fa-moon" id="bedIcon"></i> <span data-i18n="sleep">Sleep</span></div>
        <div class="recorded-time" id="bedTimeDisplay">--:--</div>
      </div>
    </button>
  </div>

  <div class="section-title" data-i18n="kpi_title">KPI</div>
  <section class="kpi-section">
    <div class="kpi-card">
      <div class="kpi-label" data-i18n="weight">Weight</div>
      <div class="kpi-value"><span id="latestWeight">-- kg</span></div>
      <div id="deltaWeight" class="kpi-delta"></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label" data-i18n="sleep_h">Sleep</div>
      <div class="kpi-value"><span id="latestSleep">-- h</span></div>
      <div id="deltaSleep" class="kpi-delta"></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label" data-i18n="mental">Mental Condition</div>
      <div class="kpi-value" style="font-size: 1.2rem;"><span id="latestMental">--</span></div>
      <div id="deltaMental" class="kpi-delta" style="color:var(--clr-text-secondary);">--</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label" data-i18n="streak">Streak</div>
      <div class="kpi-value"><span id="streakDays">0</span> <span style="font-size: 0.9rem; margin-left:4px;" data-i18n="days">Days</span></div>
      <div class="kpi-delta delta-good" data-i18n="consecutive">Consecutive</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label" data-i18n="completion">Completion</div>
      <div class="kpi-value"><span id="completionRate">0</span> <span style="font-size: 0.9rem; margin-left:4px;">%</span></div>
      <div class="kpi-delta delta-neutral" data-i18n="last30days">Last 30 Days</div>
    </div>
  </section>

  <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px;">
    <div class="section-title" style="margin-bottom: 0;" data-i18n="trend">7-Day Trend</div>
    <nav class="tab-nav">
      <button class="tab-btn active" data-i18n="analysis">Analysis</button>
      <button class="tab-btn" onclick="location.href='meals.html'" data-i18n="nav_meals">Meals</button>
      <button class="tab-btn" onclick="location.href='form.html'" data-i18n="nav_log">Daily Log</button>
      <button class="tab-btn" onclick="location.href='summary.html'" data-i18n="nav_history">History</button>
    </nav>
  </div>

  <div class="chart-card">
    <div class="chart-header-flex">
      <div class="chart-card-title" data-i18n="chart_title">Recent 7-Day Trend</div>
      <div class="chart-toggle">
        <button class="btn-toggle active" id="modeWeight">Weight / Fat</button>
        <button class="btn-toggle" id="modeSleep">Sleep / Mental</button>
      </div>
    </div>
    <div style="height:250px;"><canvas id="healthCorrelationChart"></canvas></div>
  </div>
</main>

<div class="modal-overlay" id="initialSetupModal">
  <div class="modal-content" id="initModalBlock">
    <div class="modal-title">Initial Setup</div>
    <div class="modal-desc">管理の基準となる最初のデータと、<br><span style="color: var(--clr-accent); font-weight:700;">あなたの目標値</span>を入力してください。</div>
    <form id="initialSetupForm">
      <div class="form-row-grid" style="background: rgba(251, 191, 36, 0.05); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid rgba(251, 191, 36, 0.2);">
        <div class="form-group" style="margin-bottom: 0;">
          <label class="form-label" style="color: var(--clr-accent);">TARGET Weight (kg)</label>
          <input type="number" id="initTargetWeight" class="form-input" step="0.1" value="65.0" required>
        </div>
        <div class="form-group" style="margin-bottom: 0;">
          <label class="form-label" style="color: var(--clr-accent);">TARGET Fat (%)</label>
          <input type="number" id="initTargetFat" class="form-input" step="0.1" value="13.0" required>
        </div>
      </div>
      <div class="form-row-grid">
        <div class="form-group"><label class="form-label">昨晩の就寝</label><input type="time" id="initBedtime" class="form-input" required></div>
        <div class="form-group"><label class="form-label">今朝の起床</label><input type="time" id="initWaketime" class="form-input" required></div>
      </div>
      <div class="form-row-grid">
        <div class="form-group"><label class="form-label">現在の体重 (kg)</label><input type="number" id="initWeight" class="form-input" step="0.1"></div>
        <div class="form-group"><label class="form-label">現在の体脂肪 (%)</label><input type="number" id="initFat" class="form-input" step="0.1"></div>
      </div>
      <div class="form-group">
        <label class="form-label">コンディション</label>
        <div class="cond-group" id="initMGrp">
          <button type="button" class="cond-btn" data-v="1"><i class="far fa-sad-tear"></i></button>
          <button type="button" class="cond-btn" data-v="2"><i class="far fa-frown"></i></button>
          <button type="button" class="cond-btn active" data-v="3"><i class="far fa-meh"></i></button>
          <button type="button" class="cond-btn" data-v="4"><i class="far fa-smile"></i></button>
          <button type="button" class="cond-btn" data-v="5"><i class="far fa-laugh-beam"></i></button>
        </div>
      </div>
      <button type="submit" class="btn-primary" id="initSaveBtn">Set Targets & Start</button>
    </form>
  </div>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal-content">
    <div class="modal-title">Settings</div>
    <div class="form-row-grid" style="margin-bottom: 20px;">
      <div class="form-group">
        <label class="form-label" style="color: var(--clr-accent);">TARGET Weight (kg)</label>
        <input type="number" id="settingTargetWeight" class="form-input" step="0.1" required>
      </div>
      <div class="form-group">
        <label class="form-label" style="color: var(--clr-accent);">TARGET Fat (%)</label>
        <input type="number" id="settingTargetFat" class="form-input" step="0.1" required>
      </div>
    </div>
    <div class="modal-actions">
      <button id="btnSettingsCancel" class="btn-secondary" style="margin-top:0;">Cancel</button>
      <button id="btnSettingsSave" class="btn-primary" style="margin-top:0;">Save Changes</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="mealModal">
  <div class="modal-content">
    <div class="modal-title">Meal Log</div>
    <input type="date" id="quickMealDate" class="form-input" style="margin-bottom: 20px;">
    <select id="quickMealType" class="form-input" style="margin-bottom: 20px;">
      <option value="Breakfast">Breakfast</option>
      <option value="Lunch">Lunch</option>
      <option value="Dinner">Dinner</option>
      <option value="Snack">Snack</option>
    </select>
    <input type="file" id="quickMealImage" accept="image/*" class="form-input" style="margin-bottom: 20px;">
    <input type="text" id="quickMealMemo" class="form-input" placeholder="Memo / Calories" style="margin-bottom: 20px;">
    <div class="modal-actions">
      <button id="btnMealCancel" class="btn-secondary" style="margin-top:0;">Cancel</button>
      <button id="btnMealSave" class="btn-primary" style="margin-top:0;">Save</button>
    </div>
  </div>
</div>

<div id="toastMsg"></div>

<script src="supabase-client.js"></script>
<script src="app.js"></script>
</body>
</html>
