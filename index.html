<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEALTH LOG // DB</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="form.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .ai-teaser-card { background: var(--clr-surface); border: 1px solid var(--clr-border); border-radius: var(--radius-md); padding: 20px; margin-bottom: 32px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; position: relative; overflow: hidden; backdrop-filter: blur(10px); }
    .streak-container { background: var(--clr-surface); border: 1px solid var(--clr-border); border-radius: var(--radius-md); padding: 16px; margin-bottom: 32px; }
    .streak-grid { display: grid; grid-template-rows: repeat(7, 1fr); grid-auto-flow: column; gap: 4px; overflow-x: auto; padding-bottom: 4px; }
    .streak-cell { width: 12px; height: 12px; border-radius: 2px; background: rgba(255,255,255,0.05); }
    .streak-cell.lv-1 { background: #d9770644; }
    .streak-cell.lv-2 { background: #fbbf24; box-shadow: 0 0 5px var(--clr-accent); }
    
    /* KPIカードをタップ可能に */
    .kpi-card { cursor: pointer; transition: transform 0.2s; }
    .kpi-card:active { transform: scale(0.96); }
    
    /* 詳細表示用モーダル */
    #detailModalChart { width: 100% !important; height: 220px !important; }
  </style>
</head>
<body>
<header class="app-header">
  <div class="header-inner">
    <div class="logo">HEALTH LOG <span style="color:var(--clr-text-secondary); font-weight:400;">// DB</span></div>
    <div style="display: flex; gap: 16px; align-items: center;">
      <button id="langToggleBtn" class="header-icon-btn"><i class="fas fa-language"></i> EN/JA</button>
      <button id="settingsBtn" class="header-icon-btn" onclick="location.href='settings.html'"><i class="fas fa-cog"></i></button>
      <button id="logoutBtn" class="header-logout-btn"><i class="fas fa-sign-out-alt"></i> Log Out</button>
    </div>
  </div>
</header>

<main class="app-main">
  <div class="section-title" data-i18n="quick_action">Quick Action</div>
  <div class="quick-actions">
    <button class="btn-quick wake" id="btnWaketime"><i class="fas fa-sun"></i> <span data-i18n="wake">Wake Up</span></button>
    <button class="btn-quick meal" onclick="location.href='form.html'"><i class="fas fa-utensils"></i> <span data-i18n="meal">Meal</span></button>
    <button class="btn-quick bed" id="btnBedtime"><i class="fas fa-moon"></i> <span data-i18n="sleep">Sleep</span></button>
  </div>

  <div class="section-title" data-i18n="kpi_title">KPI</div>
  <section class="kpi-section">
    <div class="kpi-card" data-kpi="weight">
      <div class="kpi-label" data-i18n="weight">Weight</div>
      <div class="kpi-value"><span id="latestWeight">-- kg</span></div>
      <div id="deltaWeight" class="kpi-delta"></div>
    </div>
    <div class="kpi-card" data-kpi="sleep_h">
      <div class="kpi-label" data-i18n="sleep_h">Sleep</div>
      <div class="kpi-value"><span id="latestSleep">-- h</span></div>
      <div id="deltaSleep" class="kpi-delta"></div>
    </div>
    <div class="kpi-card" data-kpi="streak">
      <div class="kpi-label" data-i18n="streak">Streak</div>
      <div class="kpi-value"><span id="streakDays">--</span> <span data-i18n="days" style="font-size: 0.9rem;">Days</span></div>
      <div class="kpi-delta delta-good" data-i18n="consecutive">Consecutive</div>
    </div>
    <div class="kpi-card" data-kpi="completion">
      <div class="kpi-label" data-i18n="completion">Completion</div>
      <div class="kpi-value"><span id="completionRate">--</span><span style="font-size: 0.9rem;">%</span></div>
      <div class="kpi-delta" data-i18n="last30days">Last 30 Days</div>
    </div>
  </section>

  <div class="section-title">Activity Grid</div>
  <div class="streak-container">
    <div class="streak-grid" id="activityGrid"></div>
  </div>

  <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px;">
    <div class="section-title" style="margin-bottom: 0;" data-i18n="trend">7-Day Trend</div>
    <nav class="tab-nav">
      <button class="tab-btn active" data-i18n="analysis">Analysis</button>
      <button class="tab-btn" onclick="location.href='meals.html'" data-i18n="nav_meals">Meals</button>
      <button class="tab-btn" onclick="location.href='form.html'" data-i18n="nav_log">Daily Log</button>
      <button class="tab-btn" onclick="location.href='summary.html'" data-i18n="nav_history">History</button>
    </nav>
  </div>

  <div class="chart-card">
    <div style="height:250px;"><canvas id="healthCorrelationChart"></canvas></div>
  </div>
</main>

<div class="modal-overlay" id="kpiDetailModal">
  <div class="modal-content">
    <div class="modal-title" id="mdKpiTitle">Detail</div>
    <div style="height:220px; margin-bottom: 24px;"><canvas id="detailModalChart"></canvas></div>
    <button class="btn-secondary" onclick="document.getElementById('kpiDetailModal').style.display='none'">CLOSE</button>
  </div>
</div>

<script src="supabase-client.js"></script>
<script src="app.js"></script>
</body>
</html>
