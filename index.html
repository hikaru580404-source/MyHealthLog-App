<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AsirLabo">
  <link rel="manifest" href="manifest.json">
  <title>HEALTH LOG // DB</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="form.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .high-goal-container { margin-bottom: 24px; }
    .high-goal-card { background: rgba(251, 191, 36, 0.05); border: 1px dashed var(--clr-accent); border-radius: var(--radius-md); padding: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center; transition: background 0.2s; }
    .high-goal-card:hover { background: rgba(251, 191, 36, 0.1); }
    .high-goal-text { color: var(--clr-accent); font-weight: 700; font-size: 0.9rem; letter-spacing: 0.05em; line-height: 1.4; }
    .dual-score-container { display: flex; gap: 16px; margin-bottom: 24px; }
    .score-box { flex: 1; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: var(--radius-lg); padding: 16px 8px; text-align: center; }
    .score-title { font-size: 0.75rem; font-weight: 700; color: var(--clr-text-secondary); margin-bottom: 12px; letter-spacing: 0.05em; }
    .score-circle-wrap { position: relative; width: 100px; height: 100px; margin: 0 auto; }
    .score-circle { width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(var(--clr-accent) 0%, rgba(255,255,255,0.05) 0%); display: flex; align-items: center; justify-content: center; transition: background 0.5s ease-out; }
    .score-inner { width: 80px; height: 80px; border-radius: 50%; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }
    .score-value { font-size: 1.4rem; font-weight: 800; color: #fff; font-family: var(--font-en); }
    .score-slider { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; }
    .streak-container { background: var(--clr-surface); border: 1px solid var(--clr-border); border-radius: var(--radius-md); padding: 16px; margin-bottom: 24px; }
    .streak-grid { display: grid; grid-template-rows: repeat(7, 1fr); grid-auto-flow: column; gap: 4px; overflow-x: auto; padding-bottom: 8px; }
    .streak-cell { width: 11px; height: 11px; border-radius: 2px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.02); }
    .streak-cell.lv-2 { background: var(--clr-accent); box-shadow: 0 0 8px var(--clr-accent); border-color: transparent; }
    .ai-teaser-premium { background: linear-gradient(135deg, rgba(251, 191, 36, 0.15) 0%, rgba(217, 119, 6, 0.05) 100%); border: 1px solid var(--clr-border); border-radius: var(--radius-md); padding: 20px; margin-bottom: 24px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; position: relative; overflow: hidden; backdrop-filter: blur(10px); }
    .ai-teaser-premium::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, transparent, rgba(251, 191, 36, 0.2), transparent); animation: ai-shimmer 4s infinite; }
    @keyframes ai-shimmer { 0% { left: -100%; } 100% { left: 200%; } }
    .ai-teaser-info { display: flex; align-items: center; gap: 16px; }
    .ai-teaser-icon { font-size: 1.6rem; color: var(--clr-accent); }
    .ai-teaser-text h4 { font-size: 0.95rem; color: #fff; margin-bottom: 2px; font-weight: 800; }
    .ai-teaser-text p { font-size: 0.75rem; color: var(--clr-text-secondary); }
    .kpi-card { cursor: pointer; transition: transform 0.2s, background 0.2s; }
    .kpi-card:active { transform: scale(0.96); background: rgba(26, 33, 51, 0.9); }
    .btn-quick.wake { color: #f97316; }
    .btn-quick.meal { color: #84cc16; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
    .btn-quick.bed { background: linear-gradient(145deg, #fbbf24, #b45309); border: 2px solid #fef3c7; box-shadow: inset 0 0 10px rgba(0,0,0,0.3), 0 5px 15px rgba(251, 191, 36, 0.4); text-shadow: 0 1px 2px rgba(0,0,0,0.5); position: relative; overflow: hidden; color: #fff; font-weight: 800; }
    .btn-quick.bed::before { content:''; position:absolute; top:0; left:-100%; width:50%; height:100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); animation: shine 3s infinite; }
    @keyframes shine { 0% {left:-100%;} 100% {left:200%;} }
    .btn-quick.bed:active { transform: scale(0.95) translateY(2px); box-shadow: 0 0 5px rgba(251, 191, 36, 0.2); }
    .night-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: opacity 1s; }
    .night-overlay.active { display: flex; opacity: 1; }
    .night-text { color: var(--clr-accent); font-size: 1.5rem; font-weight: 800; letter-spacing: 0.2em; font-family: var(--font-en); text-shadow: 0 0 20px rgba(251,191,36,0.8); transform: scale(0.9); transition: transform 2s ease-out; }
    .night-overlay.active .night-text { transform: scale(1); }
    .btn-secondary.edit-history { width: 100%; padding: 16px; margin-top: 12px; margin-bottom: 24px; font-size: 0.95rem; font-weight: 700; color: var(--clr-accent); border: 1px solid rgba(251, 191, 36, 0.3); }
    .btn-secondary.edit-history:hover { background: rgba(251, 191, 36, 0.1); border-color: var(--clr-accent); }
  </style>
</head>
<body>

<div class="night-overlay" id="nightOverlay">
  <div class="night-text">PERFECT GOVERNANCE</div>
  <div style="color: #94a3b8; font-size: 0.85rem; margin-top: 16px;">今日も1日、統治完了。おやすみなさい。</div>
</div>

<header class="app-header">
  <div class="header-inner">
    <div class="logo">HEALTH LOG <span style="color:var(--clr-text-secondary); font-weight:400;">// DB</span></div>
    <div style="display: flex; gap: 12px; align-items: center;">
      <button class="header-icon-btn" onclick="location.href='settings.html'"><i class="fas fa-cog"></i></button>
    </div>
  </div>
</header>

<main class="app-main">
  <div class="high-goal-container">
    <div class="high-goal-card" id="highGoalCard">
      <span class="high-goal-text" id="highGoalText">（タップして究極のゴールを設定）</span>
    </div>
  </div>

  <div class="dual-score-container">
    <div class="score-box">
      <div class="score-title">客観活力スコア (AI)</div>
      <div class="score-circle-wrap">
        <div class="score-circle" id="vitalityCircle">
          <div class="score-inner"><span class="score-value"><span id="vitalityValue">--</span>%</span></div>
        </div>
      </div>
    </div>
    <div class="score-box">
      <div class="score-title">主観戦闘力スコア</div>
      <div class="score-circle-wrap">
        <div class="score-circle" id="powerCircle">
          <div class="score-inner"><span class="score-value"><span id="powerValue">80</span>%</span></div>
        </div>
        <input type="range" min="0" max="100" value="80" class="score-slider" id="powerSlider">
      </div>
    </div>
  </div>

  <div class="quick-actions">
    <button class="btn-quick wake" id="btnWaketime"><i class="fas fa-sun"></i> Wake</button>
    <a href="meals.html" class="btn-quick meal"><i class="fas fa-utensils"></i> Meal</a>
    <button class="btn-quick bed" id="btnBedtime"><i class="fas fa-moon"></i> Sleep</button>
  </div>
  
  <button class="btn-secondary edit-history" id="btnEditHistory"><i class="fas fa-calendar-alt"></i> 日次記録（過去ログ修正・監査）</button>

  <div class="ai-teaser-premium" onclick="alert('プレミアム機能（食事解析・ダイエット支援）は準備中です。毎日の食事画像データの蓄積が最高の資産となります。')">
    <div class="ai-teaser-info">
      <div class="ai-teaser-icon"><i class="fas fa-brain"></i></div>
      <div class="ai-teaser-text">
        <h4>AI Personal Coach Standby</h4>
        <p>解析・ダイエット支援（準備中）</p>
      </div>
    </div>
    <div style="color: var(--clr-accent);"><i class="fas fa-chevron-right"></i></div>
  </div>

  <section class="kpi-section">
    <div class="kpi-card" data-kpi="weight"><div class="kpi-label">Weight</div><div class="kpi-value"><span id="latestWeight">--</span> kg</div><div id="deltaWeight" class="kpi-delta"></div></div>
    <div class="kpi-card" data-kpi="fat"><div class="kpi-label">Body Fat</div><div class="kpi-value"><span id="latestFat">--</span> %</div><div class="kpi-delta" id="deltaFat">--</div></div>
    <div class="kpi-card" data-kpi="sleep"><div class="kpi-label">Sleep</div><div class="kpi-value"><span id="latestSleep">--</span> h</div><div id="deltaSleep" class="kpi-delta"></div></div>
    <div class="kpi-card" data-kpi="mental"><div class="kpi-label">Mental</div><div class="kpi-value" id="latestMental">--</div><div class="kpi-delta">--</div></div>
    <div class="kpi-card" data-kpi="streak"><div class="kpi-label">Streak</div><div class="kpi-value"><span id="streakDays">--</span> Days</div><div class="kpi-delta delta-good">Consecutive</div></div>
    <div class="kpi-card" data-kpi="log_count"><div class="kpi-label">Logs</div><div class="kpi-value"><span id="monthLogs">--</span> Days</div><div class="kpi-delta delta-good">This Month</div></div>
  </section>

  <div class="section-title">Activity Grid (Last 90 Days)</div>
  <div class="streak-container">
    <div class="streak-grid" id="activityGrid"></div>
  </div>

  <nav class="tab-nav">
    <button class="tab-btn active">Analysis</button>
    <button class="tab-btn" onclick="location.href='meals.html'">Meals(画像)</button>
    <button class="tab-btn" onclick="location.href='summary.html'">History</button>
  </nav>

  <div class="chart-card">
    <div style="height:250px;"><canvas id="healthCorrelationChart"></canvas></div>
  </div>
</main>

<div class="modal-overlay" id="kpiDetailModal">
  <div class="modal-content" style="max-width: 450px;">
    <div class="modal-title" id="mdKpiTitle">Detail</div>
    <div class="kpi-value" style="text-align:center; margin-bottom:20px; font-size: 2.5rem;" id="mdKpiMainValue">--</div>
    <div id="mdAdvice" class="md-advice-box" style="background: rgba(255,255,255,0.05); border-left: 3px solid var(--clr-accent); padding: 16px; margin-bottom: 24px; font-size: 0.9rem; line-height: 1.6; border-radius: 0 4px 4px 0; color: #eee; font-weight: 600;"></div>
    <div style="height:180px; margin-bottom: 24px;"><canvas id="detailModalChart"></canvas></div>
    <button class="btn-secondary" onclick="document.getElementById('kpiDetailModal').style.display='none'">Close</button>
  </div>
</div>

<script src="supabase-client.js"></script>
<script src="app.js"></script>
</body>
</html>
