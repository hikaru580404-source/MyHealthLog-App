<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>「**健康管理システム**」</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="header-row1">
      <div class="header-logo"><i class="fas fa-heartbeat"></i></div>
      <div class="header-nav">
        <a href="form.html" class="btn-form-link" title="「**データを入力**」">
          <i class="fas fa-pen-alt"></i><span>「**記録**」</span>
        </a>
        <a href="summary.html" class="btn-form-link" title="「**履歴サマリー**」">
          <i class="fas fa-chart-bar"></i><span>「**分析**」</span>
        </a>
      </div>
    </div>
    <div class="header-row2">
      <button class="month-nav-btn" id="prevMonthBtn"><i class="fas fa-chevron-left"></i></button>
      <span class="month-label" id="currentMonthLabel"></span>
      <button class="month-nav-btn" id="nextMonthBtn"><i class="fas fa-chevron-right"></i></button>
    </div>
  </div>
</header>

<main class="app-main">
  <section class="kpi-section">
    <div class="kpi-card income">
      <div class="kpi-icon"><i class="fas fa-weight"></i></div>
      <div class="kpi-body">
        <div class="kpi-label">「**最新の体重**」</div>
        <div class="kpi-value" id="kpiWeight">-- kg</div>
      </div>
    </div>
    <div class="kpi-card expense">
      <div class="kpi-icon"><i class="fas fa-percent"></i></div>
      <div class="kpi-body">
        <div class="kpi-label">「**最新の体脂肪率**」</div>
        <div class="kpi-value" id="kpiFat">-- %</div>
      </div>
    </div>
    <div class="kpi-card balance">
      <div class="kpi-icon"><i class="fas fa-calendar-check"></i></div>
      <div class="kpi-body">
        <div class="kpi-label">「**今月の計測日数**」</div>
        <div class="kpi-value" id="kpiLogCount">0 日</div>
      </div>
    </div>
    <div class="kpi-card forecast">
      <div class="kpi-icon"><i class="fas fa-bullseye"></i></div>
      <div class="kpi-body">
        <div class="kpi-label">「**目標達成まで**」</div>
        <div class="kpi-value" id="kpiTarget">-- kg</div>
      </div>
    </div>
  </section>

  <nav class="tab-nav">
    <button class="tab-btn active"><i class="fas fa-th-large"></i> 「**ダッシュボード**」</button>
    <button class="tab-btn" onclick="location.href='form.html'"><i class="fas fa-plus"></i> 「**入力**」</button>
    <button class="tab-btn" onclick="location.href='summary.html'"><i class="fas fa-list"></i> 「**履歴**」</button>
  </nav>

  <section class="tab-content active">
    <div class="chart-card">
      <div class="chart-card-header"><i class="fas fa-chart-line"></i> 「**体重推移（今月）**」</div>
      <div class="chart-wrap" style="height:200px;"><canvas id="healthChart"></canvas></div>
    </div>
  </section>
</main>

<script src="supabase-client.js"></script>
<script src="app.js"></script>
</body>
</html>
