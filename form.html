<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>「**データ記録**」 | 健康管理システム</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="form.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>「**健康データの記録**」</h1>
            <a href="index.html" class="btn-back">「**戻る**」</a>
        </header>

        <main>
            <form id="health-form">
                <div class="input-group">
                    <label>「**計測日**」</label>
                    <input type="date" id="measured_date" required>
                </div>
                <div class="input-group">
                    <label>「**体重 (kg)**」</label>
                    <input type="number" id="weight" step="0.1" required placeholder="00.0">
                </div>
                <div class="input-group">
                    <label>「**体脂肪率 (%)**」</label>
                    <input type="number" id="body_fat" step="0.1" placeholder="00.0">
                </div>
                <div class="input-group">
                    <label>「**メモ・体調**」</label>
                    <textarea id="notes" rows="4" placeholder="「**今日の体調や運動内容など**」"></textarea>
                </div>
                <button type="submit" class="btn-submit">「**この内容で保存する**」</button>
            </form>
            <p id="message" class="text-center"></p>
        </main>
    </div>

    <script src="supabase-client.js"></script>
    <script src="form.js"></script>
</body>
</html>
