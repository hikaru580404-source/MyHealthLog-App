<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>「**健康データ入力**」 | 健康管理システム</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="form.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="form-header">
    <div class="form-header-inner">
      <a href="index.html" class="header-back-btn"><i class="fas fa-chart-pie"></i><span>「**ダッシュボード**」</span></a>
      <div class="header-title"><i class="fas fa-pen-alt"></i><span>「**計測記録**」</span></div>
      <div class="header-date" id="headerDate"></div>
    </div>
  </header>

  <main class="form-main">
    <div class="step-indicator">
      <div class="step active" id="step1Dot"><div class="step-dot"><span>1</span></div><div class="step-label">「**入力**」</div></div>
      <div class="step-line"></div>
      <div class="step" id="step2Dot"><div class="step-dot"><span>2</span></div><div class="step-label">「**確認**」</div></div>
      <div class="step-line"></div>
      <div class="step" id="step3Dot"><div class="step-dot"><span>3</span></div><div class="step-label">「**完了**」</div></div>
    </div>

    <div class="step-panel active" id="panelInput">
      <div class="form-card">
        <div class="quick-balance" id="quickBalance">
          <div class="qb-item"><i class="fas fa-weight"></i><span class="qb-label">「**最新体重**」</span><span class="qb-val bank-color" id="qbWeight">-- kg</span></div>
          <div class="qb-divider"></div>
          <div class="qb-item"><i class="fas fa-percent"></i><span class="qb-label">「**最新体脂肪**」</span><span class="qb-val cash-color" id="qbFat">-- %</span></div>
          <div class="qb-divider"></div>
          <div class="qb-item"><i class="fas fa-calendar-check"></i><span class="qb-label">「**今月回数**」</span><span class="qb-val total-color" id="qbCount">0 回</span></div>
        </div>

        <form id="healthForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="inputDate"><i class="fas fa-calendar-day"></i> 「**計測日**」</label>
            <input type="date" id="inputDate" class="form-input" required />
          </div>

          <div class="form-group">
            <label class="form-label" for="inputWeight"><i class="fas fa-weight"></i> 「**体重 (kg)**」</label>
            <div class="amount-input-wrap">
              <input type="number" id="inputWeight" class="form-input amount-input" step="0.1" required placeholder="00.0" />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="inputFat"><i class="fas fa-percent"></i> 「**体脂肪率 (%)**」</label>
            <div class="amount-input-wrap">
              <input type="number" id="inputFat" class="form-input amount-input" step="0.1" placeholder="00.0" />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="inputMemo"><i class="fas fa-sticky-note"></i> 「**メモ・体調**」 <span class="label-optional">「**任意**」</span></label>
            <input type="text" id="inputMemo" class="form-input" maxlength="80" placeholder="「**ワークアウト内容など**」" />
          </div>

          <button type="submit" class="btn-next">「**確認画面へ**」 <i class="fas fa-arrow-right"></i></button>
        </form>
      </div>
    </div>

    <div class="step-panel" id="panelConfirm">
      <div class="confirm-card">
        <div class="confirm-header">
          <div class="confirm-type-badge income">「**計測データ確認**」</div>
          <div class="confirm-amount" id="confirmSummary"></div>
        </div>
        <div class="confirm-table">
          <div class="confirm-row"><span class="confirm-key"><i class="fas fa-calendar"></i> 「**日付**」</span><span class="confirm-val" id="confirmDate"></span></div>
          <div class="confirm-row"><span class="confirm-key"><i class="fas fa-weight"></i> 「**体重**」</span><span class="confirm-val" id="confirmWeight"></span></div>
          <div class="confirm-row"><span class="confirm-key"><i class="fas fa-percent"></i> 「**体脂肪**」</span><span class="confirm-val" id="confirmFat"></span></div>
          <div class="confirm-row"><span class="confirm-key"><i class="fas fa-sticky-note"></i> 「**メモ**」</span><span class="confirm-val" id="confirmMemo"></span></div>
        </div>
        <div class="confirm-actions">
          <button class="btn-back" id="backToInputBtn"><i class="fas fa-arrow-left"></i> 「**修正する**」</button>
          <button class="btn-confirm" id="confirmSaveBtn"><i class="fas fa-check"></i> 「**確定する**」</button>
        </div>
      </div>
    </div>

    <div class="step-panel" id="panelDone">
      <div class="done-card">
        <div class="done-icon"><i class="fas fa-check-circle"></i></div>
        <h2 class="done-title">「**記録完了！**」</h2>
        <div class="done-actions">
          <button class="btn-add-more" onclick="location.reload()"><i class="fas fa-plus"></i> 「**続けて入力**」</button>
          <a href="index.html" class="btn-go-dashboard"><i class="fas fa-chart-pie"></i> 「**ダッシュボードへ**」</a>
        </div>
      </div>
    </div>
  </main>

  <script src="supabase-client.js"></script>
  <script src="form.js"></script>
</body>
</html>
